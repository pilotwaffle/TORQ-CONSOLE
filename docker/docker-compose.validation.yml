version: '3.8'

services:
  torq-validation-db:
    image: postgres:15-alpine
    container_name: torq_validation_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: torq_validation
    ports:
      - "5433:5432"  # Use 5433 to avoid conflicts with any existing PostgreSQL
    volumes:
      - torq_validation_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # Optional: pgAdmin for database inspection
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: torq_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@torq.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - torq-validation-db
    restart: unless-stopped

volumes:
  torq_validation_data:
    driver: local
